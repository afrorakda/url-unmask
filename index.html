<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URL Unmask</title>
    
    <link rel="icon" href="image_55.png">
    <link rel="apple-touch-icon" href="image_55.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            /* 修正: スクロールを阻害しない配置に変更 */
            display: block; 
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
            /* 修正: コンテンツ量に応じて伸びるように設定 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
        .subtitle { font-size: 0.85rem; color: #666; font-weight: 500; margin-bottom: 30px; }

        .input-container {
            position: relative;
            margin-bottom: 25px;
        }

        .input-box {
            width: 100%;
            min-height: 60px;
            padding: 18px;
            padding-right: 65px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background: var(--input-bg);
            font-size: 1rem;
            font-weight: 700;
            color: var(--main) !important;
            box-sizing: border-box;
            outline: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
            resize: none;
            overflow: hidden;
            line-height: 1.4;
        }
        .input-box::placeholder { color: #888; -webkit-text-fill-color: #888; }

        .clear-btn {
            position: absolute;
            right: 15px;
            top: 15px;
            background: none;
            border: none;
            color: #999;
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            padding: 5px 8px;
            display: none;
        }
        .clear-btn.active { display: block; }

        .section-title {
            text-align: left;
            font-size: 0.7rem;
            font-weight: 900;
            color: #bbb;
            margin: 35px 0 12px 5px; /* 余白を広げてセクションを強調 */
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #f5f5f5;
            padding-bottom: 5px;
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .result-card {
            background: #fff;
            border: 1px solid #f0f0f0;
            border-radius: var(--radius);
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .result-card:active { transform: scale(0.97); background-color: var(--input-bg); }

        .label { font-size: 0.6rem; color: #aaa; font-weight: 800; margin-bottom: 4px; text-transform: uppercase; }
        .value { font-size: 0.9rem; font-weight: 700; color: var(--main); word-break: break-all; line-height: 1.4; }
        
        .copy-hint {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(51, 51, 51, 0.9);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        footer { margin-top: auto; padding: 60px 0 30px; font-size: 11px; color: #aaa; line-height: 1.8; }
        .footer-btns { margin-top: 30px; }
        .kofi-btn {
            display: inline-block; background: var(--main); color: #fff;
            padding: 12px 25px; border-radius: var(--radius);
            text-decoration: none; font-weight: bold; font-size: 14px; margin-bottom: 12px;
        }
        .home-btn {
            display: block; width: 60%; margin: 0 auto; background: var(--accent);
            color: var(--main); border: none; padding: 10px;
            border-radius: var(--radius); font-weight: 700; font-size: 13px; cursor: pointer;
        }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: #fff; width: 85%; max-width: 320px; padding: 30px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 20px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>URL Unmask</h1>
    <p class="subtitle">Ultimate URL Decoder & Explorer.</p>

    <div class="input-container">
        <textarea class="input-box" id="urlInput" placeholder="Paste URL here..." oninput="autoHeight(); process();" rows="1" spellcheck="false"></textarea>
        <button class="clear-btn" id="clearBtn" onclick="clearInput()">clr</button>
    </div>

    <div id="resultArea">
        </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer>
        <div>No login / No tracking / No ads / Browser only</div>
        <div>Privacy Policy / afrorakda © 2026</div>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3>📱 Install</h3>
        <p>Add to your home screen.</p>
        <p>🍏 <strong>iPhone (Safari):</strong><br>Tap Share, then Add to Home Screen.</p>
        <p>🤖 <strong>Android (Chrome):</strong><br>Tap Menu (⋮), then Add to Home Screen.</p>
    </div>
</div>

<script>
    const urlInput = document.getElementById('urlInput');
    const resultArea = document.getElementById('resultArea');
    const clearBtn = document.getElementById('clearBtn');

    function autoHeight() {
        urlInput.style.height = 'auto';
        urlInput.style.height = urlInput.scrollHeight + 'px';
    }

    function process() {
        const val = urlInput.value.trim();
        if (val.length > 0) {
            clearBtn.classList.add('active');
            renderResults(val);
        } else {
            clearBtn.classList.remove('active');
            resultArea.innerHTML = '';
        }
    }

    function renderResults(input) {
        resultArea.innerHTML = '';

        let decoded = '';
        try { decoded = decodeURIComponent(input.replace(/\+/g, ' ')); } catch(e) { decoded = input; }
        let encoded = encodeURIComponent(input);

        // Core Section
        let html = `
            <div class="section-title">Analysis</div>
            <div class="result-list">
                <div class="result-card" onclick="copyText(this)">
                    <span class="label">Decoded (Unmasked)</span>
                    <span class="value">${decoded}</span>
                    <div class="copy-hint">COPIED!</div>
                </div>
                <div class="result-card" onclick="copyText(this)">
                    <span class="label">Encoded (Masked)</span>
                    <span class="value">${encoded}</span>
                    <div class="copy-hint">COPIED!</div>
                </div>
            </div>
        `;

        // Deep Unmask Section
        if (decoded.includes('%')) {
            try {
                const deepDecoded = decodeURIComponent(decoded.replace(/\+/g, ' '));
                if (deepDecoded !== decoded) {
                    html += `
                        <div class="section-title">Deep Unmask</div>
                        <div class="result-list">
                            <div class="result-card" onclick="copyText(this)">
                                <span class="label">Double Decoded</span>
                                <span class="value">${deepDecoded}</span>
                                <div class="copy-hint">COPIED!</div>
                            </div>
                        </div>
                    `;
                }
            } catch(e) {}
        }

        // Parameters Section
        try {
            const urlStr = input.startsWith('http') ? input : 'https://' + input;
            const urlObj = new URL(urlStr);
            const params = new URLSearchParams(urlObj.search);
            const paramEntries = Array.from(params.entries());

            if (paramEntries.length > 0) {
                html += `<div class="section-title">Parameters</div><div class="result-list">`;
                paramEntries.forEach(([key, val]) => {
                    html += `
                        <div class="result-card" onclick="copyText(this)">
                            <span class="label">Key: ${key}</span>
                            <span class="value">${val}</span>
                            <div class="copy-hint">COPIED!</div>
                        </div>
                    `;
                });
                html += `</div>`;
            }
        } catch(e) {}

        resultArea.innerHTML = html;
    }

    function copyText(el) {
        const text = el.querySelector('.value').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const hint = el.querySelector('.copy-hint');
            hint.style.opacity = '1';
            setTimeout(() => { hint.style.opacity = '0'; }, 800);
        });
    }

    function clearInput() {
        urlInput.value = '';
        urlInput.style.height = 'auto';
        clearBtn.classList.remove('active');
        resultArea.innerHTML = '';
        urlInput.focus();
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
